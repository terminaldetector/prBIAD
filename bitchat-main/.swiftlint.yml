# Build artifacts and generated sources; keeps local `swiftlint` runs clean
# (CI checkouts are fresh, so this only matters in a working tree).
excluded:
  - .build
  - .claude
  - .swiftpm
  - .DerivedData
  - DerivedData
  - build
  - localPackages/*/.build

disabled_rules:
  - line_length
  - type_name
  - identifier_name
  - statement_position
  - implicit_optional_initialization
  - force_try
  - vertical_whitespace
  - for_where
  - control_statement
  - void_function_in_ternary
  - redundant_discardable_let  # SwiftUI breaks without it
  # To be enabled as we fix the issues
  - trailing_whitespace
  - cyclomatic_complexity
  - function_body_length
  - function_parameter_count
  - type_body_length
  - file_length
  - large_tuple
  - force_cast
  - multiple_closures_with_trailing_closure
  - nesting
